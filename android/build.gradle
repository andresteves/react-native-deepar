buildscript {
  if (project == rootProject) {
    repositories {
      google()
      mavenCentral()
    }

    dependencies {
      classpath 'com.android.tools.build:gradle:8.13.0'
    }
  }
}

apply plugin: 'com.android.library'

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
  compileSdkVersion safeExtGet('Deepar_compileSdkVersion', 36)
  buildToolsVersion safeExtGet('Deepar_buildToolsVersion', '35.0.0')
  defaultConfig {
    minSdkVersion safeExtGet('Deepar_minSdkVersion', 23)
    targetSdkVersion safeExtGet('Deepar_targetSdkVersion', 36)
    versionCode 1
    versionName "1.0"
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }
  lintOptions {
    disable 'GradleCompatible'
  }
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
}

repositories {
  mavenLocal()
  maven {
    // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
    url("$rootDir/../node_modules/react-native/android")
  }
  google()
  mavenCentral()
  maven {
    url "https://sdk.developer.deepar.ai/maven-android-repository/releases/"
  }
}

dependencies {
  //noinspection GradleDynamicVersion
  implementation "com.facebook.react:react-native:+"  // From node_modules
//  implementation fileTree(dir: "libs", include: ["*.aar"])
  implementation "ai.deepar.ar:DeepAR:5.6.20"
  // CameraX core library using the camera2 implementation
  def camerax_version = "1.5.0"

  implementation "androidx.camera:camera-camera2:${camerax_version}"
  implementation "androidx.camera:camera-lifecycle:${camerax_version}"
  implementation "androidx.camera:camera-view:${camerax_version}"

  // The following line is optional, as the core library is included indirectly by camera-camera2
  implementation "androidx.camera:camera-core:${camerax_version}"

  implementation 'com.google.guava:guava:32.0.1-android'
}
